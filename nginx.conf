server {
    listen 80;
    server_name advbrandterm.com www.advbrandterm.com;

    # Redirect all HTTP → HTTPS (Certbot will handle this automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name advbrandterm.com www.advbrandterm.com;

    # SSL Certificates managed by Certbot (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/advbrandterm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/advbrandterm.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Serve the React SPA
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # Critical for React Router SPA

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # Proxy Gemini (same-origin in browser; avoids CORS)
    location /gemini-api/ {
        proxy_pass https://generativelanguage.googleapis.com/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host generativelanguage.googleapis.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy API requests to the backend container
    location /api/ {
        proxy_pass http://maestro-backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Certbot challenge files
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
